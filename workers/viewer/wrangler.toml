name = "rg-viewer"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[vars]
TRACKER_URL = "https://track.royalglass.co.nz/track"

[[r2_buckets]]
binding = "QUOTES_BUCKET"
bucket_name = "rg-dev-quote"

# Dev secrets:
#   wrangler secret put DATABASE_URL       (dev Neon DB)
#   wrangler secret put GATE_HMAC_SECRET

[env.prod]
workers_dev = false

[env.prod.vars]
TRACKER_URL = "https://track.royalglass.co.nz/track"

[[env.prod.r2_buckets]]
binding = "QUOTES_BUCKET"
bucket_name = "rg-quotes"

[[env.prod.routes]]
pattern = "quotes.royalglass.co.nz"
custom_domain = true

# Prod secrets:
#   wrangler secret put DATABASE_URL --env prod       (prod Neon DB)
#   wrangler secret put GATE_HMAC_SECRET --env prod
