name = "rg-viewer"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
TRACKER_URL = "https://rg-tracker.royalglass666.workers.dev/track"

# R2 bucket binding - PDF storage
[[r2_buckets]]
binding = "QUOTES_BUCKET"
bucket_name = "rg-quotes"

# DATABASE_URL is set as an encrypted secret via:
#   wrangler secret put DATABASE_URL
# (paste the Neon DATABASE_URL from .env.local when prompted)

# Custom domain - uncomment after adding royalglass.co.nz to Cloudflare:
# [[routes]]
# pattern = "quotes.royalglass.co.nz/*"
# zone_name = "royalglass.co.nz"
