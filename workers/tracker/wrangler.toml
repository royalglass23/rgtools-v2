name = "rg-tracker"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# DATABASE_URL is stored as an encrypted secret, not a plain var.
# After creating your Cloudflare account, run:
#   wrangler secret put DATABASE_URL
# Then paste your Neon DATABASE_URL when prompted.

# Custom domain - royalglass.co.nz zone is Active on Cloudflare.
# Same-root subdomain (vs *.workers.dev) so engagement beacons aren't
# blocked by ad-blockers/firewalls. Cloudflare auto-creates DNS + TLS on deploy.
[[routes]]
pattern = "track.royalglass.co.nz"
custom_domain = true
